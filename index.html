<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🤖 AI Чат | OpenRouter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .app {
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 700px;
        }

        .header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .model-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .settings {
            padding: 12px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .settings select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 0.8rem;
            background: white;
            cursor: pointer;
        }
        .settings button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .settings button:active { transform: scale(0.97); }
        .key-status {
            font-size: 0.7rem;
            background: #dcfce7;
            color: #15803d;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .bot-message {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .user-avatar { background: #8b5cf6; }
        .bot-avatar { background: #e2e8f0; }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .user-bubble {
            background: #8b5cf6;
            color: white;
            border-radius: 20px 20px 4px 20px;
        }
        .bot-bubble {
            background: #f1f5f9;
            color: #1e293b;
            border-radius: 20px 20px 20px 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.2); }
        }

        .input-area {
            padding: 12px 16px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            font-size: 0.9rem;
            outline: none;
        }
        .input-area input:focus {
            border-color: #8b5cf6;
        }
        .input-area button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-area button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .info {
            background: #e0e7ff;
            color: #3730a3;
            padding: 6px 16px;
            font-size: 0.65rem;
            text-align: center;
        }

        @media (max-width: 550px) {
            body { padding: 8px; }
            .chat-card { height: 92vh; border-radius: 24px; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="chat-card">
        <div class="header">
            <h1>🤖 AI Чат</h1>
            <div class="model-badge" id="modelBadge">OpenRouter</div>
        </div>

        <div class="settings">
            <select id="modelSelect">
                <option value="google/gemini-2.0-flash-exp:free">✨ Gemini 2.0 Flash (бесплатно)</option>
                <option value="mistralai/mistral-7b-instruct:free">🌀 Mistral 7B (бесплатно)</option>
                <option value="meta-llama/llama-3.2-3b-instruct:free">🦙 Llama 3.2 3B</option>
                <option value="microsoft/phi-3-mini-128k-instruct:free">📘 Phi-3 Mini</option>
            </select>
            <button id="saveModelBtn">✅ Сохранить модель</button>
            <div class="key-status">🔑 API ключ активен</div>
        </div>

        <div class="messages" id="messagesContainer">
            <div class="message bot-message">
                <div class="avatar bot-avatar">🤖</div>
                <div class="bubble bot-bubble">
                    Привет! 👋<br>
                    Я подключён к OpenRouter через API-ключ.<br>
                    Можешь задать любой вопрос, я отвечу!<br>
                    <span style="font-size:0.7rem; opacity:0.7;">💡 Выбери модель и начни общение</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="sendBtn">📤 Отправить</button>
        </div>
        <div class="info">
            💬 Чат с ИИ | Выберите модель | Все сообщения сохраняются
        </div>
    </div>
</div>

<script>
    // ========== ВАШ API-КЛЮЧ ==========
    const API_KEY = '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';
    
    let currentModel = localStorage.getItem('openrouter_model') || 'google/gemini-2.0-flash-exp:free';
    let isLoading = false;
    
    const messagesContainer = document.getElementById('messagesContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const saveModelBtn = document.getElementById('saveModelBtn');
    const modelBadge = document.getElementById('modelBadge');
    
    modelSelect.value = currentModel;
    updateModelBadge();
    
    // ========== ИСТОРИЯ СООБЩЕНИЙ ==========
    let messages = [];
    
    function loadHistory() {
        const saved = localStorage.getItem('chat_history');
        if (saved) {
            try {
                messages = JSON.parse(saved);
                renderMessages();
            } catch(e) {}
        }
    }
    
    function saveHistory() {
        localStorage.setItem('chat_history', JSON.stringify(messages.slice(-50)));
    }
    
    function renderMessages() {
        messagesContainer.innerHTML = '';
        
        if (messages.length === 0) {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message bot-message';
            welcomeDiv.innerHTML = `
                <div class="avatar bot-avatar">🤖</div>
                <div class="bubble bot-bubble">
                    Привет! 👋<br>
                    Я подключён к OpenRouter через API-ключ.<br>
                    Можешь задать любой вопрос, я отвечу!<br>
                    <span style="font-size:0.7rem; opacity:0.7;">💡 Выбери модель и начни общение</span>
                </div>
            `;
            messagesContainer.appendChild(welcomeDiv);
            return;
        }
        
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user-message' : 'bot-message'}`;
            div.innerHTML = `
                <div class="avatar ${msg.role === 'user' ? 'user-avatar' : 'bot-avatar'}">
                    ${msg.role === 'user' ? '👤' : '🤖'}
                </div>
                <div class="bubble ${msg.role === 'user' ? 'user-bubble' : 'bot-bubble'}">
                    ${escapeHtml(msg.content)}
                </div>
            `;
            messagesContainer.appendChild(div);
        });
        
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }
    
    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="avatar bot-avatar">🤖</div>
            <div class="bubble bot-bubble">
                <div class="typing"><span></span><span></span><span></span></div>
            </div>
        `;
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }
    
    async function sendToAI(userMessage) {
        try {
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json',
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'AI Чат'
                },
                body: JSON.stringify({
                    model: currentModel,
                    messages: [
                        { role: 'system', content: 'Ты дружелюбный и полезный ассистент. Отвечай кратко, понятно, на русском языке.' },
                        ...messages.slice(-10).map(m => ({ role: m.role, content: m.content }))
                    ],
                    max_tokens: 1000,
                    temperature: 0.7
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                if (response.status === 401) {
                    return "❌ Ошибка авторизации. Проверьте API-ключ.";
                }
                if (response.status === 429) {
                    return "⏳ Слишком много запросов. Подождите немного.";
                }
                return `❌ Ошибка: ${error.error?.message || 'Неизвестная ошибка'}`;
            }
            
            const data = await response.json();
            return data.choices[0].message.content;
            
        } catch (error) {
            console.error('Ошибка:', error);
            return "❌ Ошибка соединения. Проверьте интернет и попробуйте снова.";
        }
    }
    
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || isLoading) return;
        
        messages.push({ role: 'user', content: text });
        renderMessages();
        saveHistory();
        userInput.value = '';
        
        isLoading = true;
        sendBtn.disabled = true;
        userInput.disabled = true;
        
        showTyping();
        const reply = await sendToAI(text);
        hideTyping();
        
        messages.push({ role: 'assistant', content: reply });
        renderMessages();
        saveHistory();
        
        isLoading = false;
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
    }
    
    function saveModel() {
        currentModel = modelSelect.value;
        localStorage.setItem('openrouter_model', currentModel);
        updateModelBadge();
        alert(`✅ Модель изменена на: ${modelSelect.options[modelSelect.selectedIndex].text}`);
    }
    
    function updateModelBadge() {
        const selected = modelSelect.options[modelSelect.selectedIndex];
        modelBadge.innerText = selected.text.split('(')[0].trim();
    }
    
    saveModelBtn.addEventListener('click', saveModel);
    modelSelect.addEventListener('change', updateModelBadge);
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isLoading) sendMessage();
    });
    
    document.querySelector('.header h1').addEventListener('dblclick', () => {
        if (confirm('Очистить всю историю чата?')) {
            messages = [];
            saveHistory();
            renderMessages();
        }
    });
    
    loadHistory();
    
    console.log('🤖 Чат с OpenRouter готов!');
    console.log('✅ API-ключ установлен');
    console.log('Модель:', currentModel);
</script>
</body>
</html>
