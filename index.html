<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneLink Messenger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="authOverlay" class="auth-overlay">
    <section class="auth-card">
      <h2>Вход в OneLink</h2>
      <p class="auth-subtitle">Регистрация по электронной почте с кодом подтверждения.</p>

      <form id="emailForm" class="auth-form">
        <label>
          Электронная почта
          <input id="emailInput" type="email" placeholder="you@example.com" required />
        </label>
        <button type="submit">Получить код</button>
      </form>

      <form id="codeForm" class="auth-form hidden">
        <label>
          Код из письма
          <input id="codeInput" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="6 цифр" required />
        </label>
        <button type="submit">Подтвердить</button>
      </form>

      <p id="authStatus" class="auth-status"></p>
      <p class="auth-note">Демо-режим: код также отображается на экране для локального теста.</p>
    </section>
  </div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">OL</div>
        <div>
          <h1>OneLink</h1>
          <p>Мессенджер нового поколения</p>
        </div>
      </div>

      <a class="apk-download" href="downloads/onelink.apk" download>
        ⬇️ Скачать Android (.apk)
      </a>

      <div class="user-badge">
        <strong id="profileEmail">Гость</strong>
        <button id="logoutBtn" class="ghost-btn">Выйти</button>
      </div>

      <label class="search-box">
        <input id="contactSearch" type="text" placeholder="Поиск чатов" />
      </label>

      <section>
        <div class="section-head">
          <h2>Чаты</h2>
          <button id="newChatBtn" class="ghost-btn">+ Новый</button>
        </div>
        <ul id="chatList" class="chat-list"></ul>
      </section>
    </aside>

    <main class="chat-pane">
      <header class="chat-header">
        <div>
          <h2 id="activeChatName">Выберите чат</h2>
          <p id="activeChatStatus">OneLink объединяет друзей и команды</p>
        </div>
        <button id="themeToggle" class="ghost-btn">🌙 Тема</button>
      </header>

      <section id="messageFeed" class="message-feed"></section>

      <form id="messageForm" class="message-form">
        <input id="messageInput" type="text" maxlength="500" placeholder="Напишите сообщение..." required />
        <button type="submit">Отправить</button>
      </form>
    </main>
  </div>

  <template id="chatItemTemplate">
    <li class="chat-item">
      <button>
        <strong class="chat-name"></strong>
        <span class="chat-preview"></span>
      </button>
    </li>
  </template>

  <template id="messageTemplate">
    <article class="message">
      <p class="message-text"></p>
      <time class="message-time"></time>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
